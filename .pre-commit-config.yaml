repos:
  # 通用基础检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  # 前端 prettier（格式化 Vue / JS / TS / CSS / JSON / Markdown）
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|ts|vue|css|scss|json|md)$

  # Java 代码格式化（google-java-format）
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-java
        args: [--autofix]

  # 前端 lint + build 检查（可选）
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend Lint
        entry: bash -c "cd vue_frontend && pnpm run lint --fix"
        language: system
        pass_filenames: false

  - repo: local
    hooks:
    -   id: check-secrets
        name: Check for secrets
        entry: bash -c 'grep -rn --include="*.properties" --include="*.yml" --include="*.yaml" "password\|secret\|key" springboot_backend/src/main/ | grep -v "# " || true'
        language: system
        pass_filenames: false
    -   id: validate-pom
        name: Validate Maven POM
        entry: bash -c 'cd springboot_backend && mvn validate'
        language: system
        pass_filenames: false
        files: pom\.xml$
    -   id: frontend-build
        name: Frontend Build
        entry: bash -c "cd vue_frontend && pnpm install && pnpm run build"
        language: system
        pass_filenames: false
