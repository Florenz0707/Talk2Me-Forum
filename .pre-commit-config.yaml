# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: check-merge-conflict
    -   id: check-json
    -   id: mixed-line-ending

-   repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
    -   id: prettier
        files: \.(js|jsx|ts|tsx|css|scss|json|md|html|vue)$

-   repo: local
    hooks:
    -   id: check-secrets
        name: Check for secrets
        entry: bash -c 'grep -rn --include="*.properties" --include="*.yml" --include="*.yaml" "password\|secret\|key" springboot_backend/src/main/resources/ | grep -v "# " || true'
        language: system
        pass_filenames: false
    -   id: validate-pom
        name: Validate Maven POM
        entry: bash -c 'cd springboot_backend && mvn validate'
        language: system
        pass_filenames: false
        files: pom\.xml$
